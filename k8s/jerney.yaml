---
# ---- Frontend nginx ConfigMap ----
# FIX: nginx inside the image listens on port 80 by default.
# Non-root users (uid 101) cannot bind to ports < 1024 — this
# causes the "bind() to 0.0.0.0:80 failed (13: Permission denied)" crash.
# This ConfigMap overrides default.conf to listen on port 8080 instead,
# and proxies /api/* requests to the backend service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jerney-frontend-nginx-conf
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-frontend
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        # FIX: listen on 8080 — non-root cannot bind to port 80
        listen       8080;
        listen  [::]:8080;
        server_name  localhost;

        # Serve the React/static frontend
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Required for single-page apps — fall back to index.html
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls to the backend service
        location /api/ {
            proxy_pass         http://jerney-backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
