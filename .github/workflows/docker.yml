name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/harbey-tech/jerney

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------- Backend ----------------
      # 4. Build & push backend image
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/jerney-backend:latest

      # 5. Scan backend image with Trivy
      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/jerney-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # 6. Sign backend image
      - name: Sign Backend Image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/jerney-backend:latest

      # ---------------- Frontend ----------------
      # 7. Build & push frontend image
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/jerney-frontend:latest

      # 8. Scan frontend image with Trivy
      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/jerney-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # 9. Sign frontend image
      - name: Sign Frontend Image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/jerney-frontend:latest
