# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (FULL COMPLETE VERSION - FINAL FIX)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ==============================================================
  # STAGE 0: Prepare
  # ==============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - id: lowercase
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ==============================================================
  # STAGE 1 & 2: Lint + SCA
  # ==============================================================
  lint-and-sca:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true
          npm audit --audit-level=high || true

  # ==============================================================
  # STAGE 3: Build & Push + Sign
  # ==============================================================
  build:
    runs-on: ubuntu-latest
    needs: [lint-and-sca, prepare]

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: vars
        run: |
          echo "IMAGE=ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE }}:${{ github.sha }}
            ${{ steps.vars.outputs.IMAGE }}:latest
          provenance: true
          sbom: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        run: |
          cosign sign --yes ${{ steps.vars.outputs.IMAGE }}:${{ github.sha }}

  # ==============================================================
  # STAGE 4: Image Scan (FIXED - MANUAL TRIVY)
  # ==============================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: [build, prepare]
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}

  # ==============================================================
  # STAGE 5: IaC Scan
  # ==============================================================
  iac-scan:
    runs-on: ubuntu-latest
    needs: lint-and-sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          soft_fail: true

  # ==============================================================
  # STAGE 6: Dockerfile Lint
  # ==============================================================
  docker-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # ==============================================================
  # STAGE 7: Update K8s Manifest
  # ==============================================================
  update-manifest:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, prepare]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update images
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO=${{ needs.prepare.outputs.repo_lower }}

          yq -i "(.spec.template.spec.containers[] | select(.name == \"backend\").image) = \"ghcr.io/$REPO/jerney-backend:$SHORT_SHA\"" k8s/jerney.yaml
          yq -i "(.spec.template.spec.containers[] | select(.name == \"frontend\").image) = \"ghcr.io/$REPO/jerney-frontend:$SHORT_SHA\"" k8s/jerney.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images [skip ci]"
          git push
