# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (SECURE VERSION)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Prevent race conditions
concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default
permissions:
  contents: read

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - working-directory: ${{ matrix.component }}
        run: npm run lint

  # ==============================================================
  # STAGE 2: Dependency Audit (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high

  # ==============================================================
  # STAGE 3: Build & Push Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write  # required for cosign

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LOWER }}/jerney-${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes ghcr.io/${{ env.REPO_LOWER }}/jerney-${{ matrix.component }}:${{ github.sha }}

  # ==============================================================
  # STAGE 4: Container Image Scan (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CR
