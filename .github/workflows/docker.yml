name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/harbey-tech/jerney
      TRIVY_CACHE: ${{ github.workspace }}/.trivy-cache

    steps:
      # ---------------- Step 1: Checkout ----------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------------- Step 2: Set up Buildx ----------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- Step 3: Login to GHCR ----------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------- Step 4: Setup Trivy ----------------
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.3

      - name: Cache Trivy DB
        uses: actions/cache@v3
        with:
          path: ${{ env.TRIVY_CACHE }}
          key: trivy-db-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # ---------------- Backend ----------------
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/jerney-backend:${{ github.sha }}

      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/jerney-backend:${{ github.sha }}
          format: table
          cache-dir: ${{ env.TRIVY_CACHE }}
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Sign Backend Image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/jerney-backend:${{ github.sha }}

      # ---------------- Frontend ----------------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/jerney-frontend:${{ github.sha }}

      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/jerney-frontend:${{ github.sha }}
          format: table
          cache-dir: ${{ env.TRIVY_CACHE }}
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Sign Frontend Image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/jerney-frontend:${{ github.sha }}
