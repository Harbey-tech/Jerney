# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (SECURE VERSION)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Prevent race conditions
concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default
permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - working-directory: ${{ matrix.component }}
        run: npm run lint

  # ==============================================================
  # STAGE 2: Dependency Audit (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high

  # ==============================================================
  # STAGE 3: Build & Push Images (with SBOM + provenance)
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write  # required for cosign

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: false

      # 🔐 Sign images
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:${{ github.sha }}

  # ==============================================================
  # STAGE 4: Container Image Scan (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  # ==============================================================
  # STAGE 5: IaC Scan (Checkov)
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true

  # ==============================================================
  # STAGE 6: Dockerfile Lint
  # ==============================================================
  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # ==============================================================
  # STAGE 7: Update K8s Manifest (SAFE)
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: sudo apt-get install -y yq

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update manifest safely
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          yq -i '
          (.spec.template.spec.containers[] | select(.name == "backend").image) = strenv(BACKEND_IMAGE) + ":" + strenv(IMAGE_TAG)
          ' k8s/jerney.yaml

          yq -i '
          (.spec.template.spec.containers[] | select(.name == "frontend").image) = strenv(FRONTEND_IMAGE) + ":" + strenv(IMAGE_TAG)
          ' k8s/jerney.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
