# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (STABLE & SECURE)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ==============================================================
  # STAGE 0: Prepare (Ensures Lowercase for OCI Compliance)
  # ==============================================================
  prepare:
    name: "🏗️ Prepare Environment"
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - name: Lowercase Registry Path
        id: lowercase
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: npm ci
      - working-directory: ${{ matrix.component }}
        run: npm run lint

  # ==============================================================
  # STAGE 2: Dependency Audit (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: npm ci
      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high

  # ==============================================================
  # STAGE 3: Build & Push Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [sca, prepare]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: false 

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}

  # ==============================================================
  # STAGE 4: Container Image Scan (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [build, prepare]
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
  
    steps:
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@v0.28.0 # FIXED: Corrected version tag
        with:
          image-ref: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==============================================================
  # STAGE 7: Update K8s Manifest
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, prepare]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: sudo apt-get install -y yq
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update manifest safely
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}
          REPO_LOWER=${{ needs.prepare.outputs.repo_lower }}
          
          yq -i "(.spec.template.spec.containers[] | select(.name == \"backend\").image) = \"ghcr.io/$REPO_LOWER/jerney-backend:$IMAGE_TAG\"" k8s/jerney.yaml
          yq -i "(.spec.template.spec.containers[] | select(.name == \"frontend\").image) = \"ghcr.io/$REPO_LOWER/jerney-frontend:$IMAGE_TAG\"" k8s/jerney.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
