# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (FULL SECURE VERSION)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ==============================================================  
  # STAGE 0: Prepare (Lowercase Repo)
  # ==============================================================  
  prepare:
    name: "🏗️ Prepare Environment"
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - name: Lowercase Registry Path
        id: lowercase
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

  # ==============================================================  
  # STAGE 1 & 2: Lint & SCA (NPM Audit)
  # ==============================================================  
  lint-and-sca:
    name: "🛡️ Audit ${{ matrix.component }}"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true
          npm audit --audit-level=high

  # ==============================================================  
  # STAGE 3, 4 & SIGNING: Combined Build, Scan & Sign
  # ==============================================================  
  build-and-secure:
    name: "🐳 Build & Secure ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [lint-and-sca, prepare]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locally
        run: |
          IMAGE_SHA=ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          IMAGE_LATEST=ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:latest
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST ./${{ matrix.component }}

      # 🔬 RUN TRIVY SCAN
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # 🔥 Push Images Only On Main Branch
      - name: Push Image (main branch only)
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          docker push ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:latest

      # 🔐 SIGN IMAGE (main branch only)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_REF=ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          cosign sign --yes $IMAGE_REF

  # ==============================================================  
  # STAGE 5: IaC Scan (Checkov)
  # ==============================================================  
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-sca
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov (IaC Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          soft_fail: true

  # ==============================================================  
  # STAGE 6: Dockerfile Lint
  # ==============================================================  
  docker-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.component }}/Dockerfile
          failure-threshold: error

  # ==============================================================  
  # STAGE 7: Update K8s Manifest
  # ==============================================================  
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build-and-secure, prepare]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: sudo apt-get install -y yq
      - name: Update manifest
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO_LOWER=${{ needs.prepare.outputs.repo_lower }}
          yq -i "(.spec.template.spec.containers[] | select(.name == \"backend\").image) = \"ghcr.io/$REPO_LOWER/jerney-backend:$SHORT_SHA\"" k8s/jerney.yaml
          yq -i "(.spec.template.spec.containers[] | select(.name == \"frontend\").image) = \"ghcr.io/$REPO_LOWER/jerney-frontend:$SHORT_SHA\"" k8s/jerney.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images [skip ci]"
          git push
