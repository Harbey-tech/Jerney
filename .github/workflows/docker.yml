# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (FULL SECURE VERSION)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ==============================================================
  # STAGE 0: Prepare (Lowercase Repo)
  # ==============================================================
  prepare:
    name: "🏗️ Prepare Environment"
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - name: Lowercase Registry Path
        id: lowercase
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

  # ==============================================================
  # STAGE 1 & 2: Lint & SCA (NPM Audit)
  # ==============================================================
  lint-and-sca:
    name: "🛡️ Audit ${{ matrix.component }}"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true
          npm audit --audit-level=high

  # ==============================================================
  # STAGE 3: Build & Push (Cosign Signing)
  # FIX: digest written to a per-component artifact file to prevent
  # matrix jobs from overwriting each other's shared job output.
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [lint-and-sca, prepare]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & Push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: true
          sbom: false
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          IMAGE_REF=ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}@${{ steps.build-push.outputs.digest }}
          cosign sign --yes $IMAGE_REF
      # FIX: Save digest to a component-scoped file and upload as artifact
      - name: Save digest to file
        run: echo "${{ steps.build-push.outputs.digest }}" > digest-${{ matrix.component }}.txt
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.component }}
          path: digest-${{ matrix.component }}.txt

  # ==============================================================
  # STAGE 4: Container Scan (Trivy)
  # FIX 1: bumped to v0.35.0 — v0.29.0 internally depends on
  #         aquasecurity/setup-trivy@v0.2.2 which no longer exists.
  # FIX 2: each matrix leg downloads its own digest artifact
  #         instead of the overwritten shared job output.
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [build, prepare]
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download digest artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.component }}
      - name: Read digest
        id: digest
        run: echo "value=$(cat digest-${{ matrix.component }}.txt)" >> $GITHUB_OUTPUT
      - name: Run Trivy scan
        # FIX 1: v0.35.0 pins setup-trivy correctly; v0.29.0 is broken
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          # FIX 2: per-component digest, not the overwritten needs.build.outputs.digest
          image-ref: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}@${{ steps.digest.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # ==============================================================
  # STAGE 5: IaC Scan (Checkov) - Terraform & K8s
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-sca
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov (IaC Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          soft_fail: true

  # ==============================================================
  # STAGE 6: Dockerfile Lint (Hadolint)
  # ==============================================================
  docker-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.component }}/Dockerfile
          failure-threshold: error

  # ==============================================================
  # STAGE 7: Update K8s Manifest
  # FIX: replaced `sudo apt-get install -y yq` (installs the Python
  # yq which requires -y/-Y alongside -i) with mikefarah/yq which
  # is the Go-based binary that supports -i/--in-place correctly.
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, prepare]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # FIX: official mikefarah/yq action instead of apt, which
      # ships the Python yq that doesn't support -i without -y
      - name: Install yq
        uses: mikefarah/yq@v4
      - name: Update manifest
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO_LOWER=${{ needs.prepare.outputs.repo_lower }}
          yq -i "(.spec.template.spec.containers[] | select(.name == \"backend\").image) = \"ghcr.io/$REPO_LOWER/jerney-backend:$SHORT_SHA\"" k8s/jerney.yaml
          yq -i "(.spec.template.spec.containers[] | select(.name == \"frontend\").image) = \"ghcr.io/$REPO_LOWER/jerney-frontend:$SHORT_SHA\"" k8s/jerney.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images [skip ci]"
          git push
