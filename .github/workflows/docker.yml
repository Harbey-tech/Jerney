# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (FINAL STABLE VERSION)
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: jerney-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io

# ==============================================================
# STAGE 0: Prepare (Lowercase Repo)
# ==============================================================
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - id: lowercase
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

# ==============================================================
# STAGE 1 & 2: Lint + SCA
# ==============================================================
  lint-and-sca:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json

      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true
          npm audit --audit-level=high

# ==============================================================
# STAGE 3: Build + Push + Sign
# ==============================================================
  build:
    runs-on: ubuntu-latest
    needs: [lint-and-sca, prepare]

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: true

      # 🔐 Cosign signing
      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}

# ==============================================================
# STAGE 4: Image Scan (FIXED)
# ==============================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: [build, prepare]
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      # ✅ FIXED: NO master, NO setup-trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: ghcr.io/${{ needs.prepare.outputs.repo_lower }}/jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

# ==============================================================
# STAGE 5: IaC Scan
# ==============================================================
  iac-scan:
    runs-on: ubuntu-latest
    needs: lint-and-sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          soft_fail: true

# ==============================================================
# STAGE 6: Dockerfile Lint
# ==============================================================
  docker-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.component }}/Dockerfile
          failure-threshold: error

# ==============================================================
# STAGE 7: Update K8s Manifest
# ==============================================================
  update-manifest:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, prepare]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: sudo apt-get install -y yq

      - name: Update manifest
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO=${{ needs.prepare.outputs.repo_lower }}

          yq -i "(.spec.template.spec.containers[] | select(.name == \"backend\").image) = \"ghcr.io/$REPO/jerney-backend:$SHORT_SHA\"" k8s/jerney.yaml
          yq -i "(.spec.template.spec.containers[] | select(.name == \"frontend\").image) = \"ghcr.io/$REPO/jerney-frontend:$SHORT_SHA\"" k8s/jerney.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update images [skip ci]"
          git push
